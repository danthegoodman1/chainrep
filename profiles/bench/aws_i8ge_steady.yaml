name: aws-i8ge-steady
aws:
  region: us-east-1
  operator_cidrs:
    - 0.0.0.0/0
  ssh_user: ec2-user
  coordinator_instance_type: m8g.2xlarge
  client_instance_type: c8g.8xlarge
  storage_instance_type: i8ge.6xlarge
  coordinator_volume_gib: 100
cluster:
  slot_count: 1024
  replication_factor: 3
  storage_node_count: 3
  heartbeat_interval: 1s
  liveness_interval: 1s
  suspect_after: 3s
  dead_after: 6s
  activation_interval: 250ms
  rpc_deadline: 5s
  reconfiguration:
    max_changed_chains: 32
workload:
  seed: 42
  preload_keys: 10000
  value_bytes: 256
  request_timeout: 3s
  per_scenario_pause: 2s
  interval: 1s
  scenarios:
    - name: get-only-c64
      kind: get
      concurrency: 64
      warmup: 10s
      duration: 30s
    - name: put-only-c32
      kind: put
      concurrency: 32
      warmup: 10s
      duration: 30s
    - name: mixed-80-20-c64
      kind: mixed
      concurrency: 64
      warmup: 10s
      duration: 30s
      read_percent: 80
telemetry:
  probe_interval: 1s
  command_interval: 1s
  extra_run_duration: 30s
artifacts:
  root_dir: artifacts/benchmarks
