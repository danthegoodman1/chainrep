syntax = "proto3";

package chainrep.v1;

option go_package = "github.com/danthegoodman1/chainrep/transport/grpcproto;grpcproto";

message Empty {}

enum ComparisonOperator {
  COMPARISON_OPERATOR_UNSPECIFIED = 0;
  COMPARISON_OPERATOR_EQ = 1;
  COMPARISON_OPERATOR_LT = 2;
  COMPARISON_OPERATOR_LTE = 3;
  COMPARISON_OPERATOR_GT = 4;
  COMPARISON_OPERATOR_GTE = 5;
}

message ObjectMetadata {
  uint64 version = 1;
  int64 created_at_unix_nano = 2;
  int64 updated_at_unix_nano = 3;
}

message BoolCondition {
  bool value = 1;
}

message VersionComparison {
  ComparisonOperator operator = 1;
  uint64 value = 2;
}

message TimeComparison {
  ComparisonOperator operator = 1;
  int64 unix_nano = 2;
}

message WriteConditions {
  BoolCondition exists = 1;
  VersionComparison version = 2;
  TimeComparison updated_at = 3;
}

message FailureDomain {
  string key = 1;
  string value = 2;
}

message Node {
  string id = 1;
  string rpc_address = 2;
  repeated FailureDomain failure_domains = 3;
}

message BootstrapRequest {
  string command_id = 1;
  uint64 expected_version = 2;
  int32 slot_count = 3;
  int32 replication_factor = 4;
  repeated Node nodes = 5;
}

message MembershipMutationRequest {
  string command_id = 1;
  uint64 expected_version = 2;
  int32 max_changed_chains = 3;
  Node node = 4;
  string node_id = 5;
}

message RegisterNodeRequest {
  Node node = 1;
}

message ServerState {
  uint64 version = 1;
}

message RoutingSnapshotRequest {}

message SlotRoute {
  int32 slot = 1;
  uint64 chain_version = 2;
  string head_node_id = 3;
  string head_endpoint = 4;
  string tail_node_id = 5;
  string tail_endpoint = 6;
  bool writable = 7;
  bool readable = 8;
}

message RoutingSnapshotResponse {
  uint64 version = 1;
  int32 slot_count = 2;
  repeated SlotRoute slots = 3;
}

message ReplicaReadyReport {
  string node_id = 1;
  int32 slot = 2;
  string command_id = 3;
  uint64 epoch = 4;
}

message ReplicaRemovedReport {
  string node_id = 1;
  int32 slot = 2;
  string command_id = 3;
  uint64 epoch = 4;
}

message NodeStatus {
  string node_id = 1;
  int32 replica_count = 2;
  int32 active_count = 3;
  int32 catching_up_count = 4;
  int32 leaving_count = 5;
}

message ChainPeers {
  string predecessor_node_id = 1;
  string predecessor_target = 2;
  string successor_node_id = 3;
  string successor_target = 4;
}

message ReplicaAssignment {
  int32 slot = 1;
  uint64 chain_version = 2;
  string role = 3;
  ChainPeers peers = 4;
}

message RecoveredReplica {
  ReplicaAssignment assignment = 1;
  string last_known_state = 2;
  uint64 highest_committed_sequence = 3;
  bool has_committed_data = 4;
}

message NodeRecoveryReport {
  string node_id = 1;
  repeated RecoveredReplica replicas = 2;
}

message AddReplicaAsTailCommand {
  ReplicaAssignment assignment = 1;
  uint64 epoch = 2;
}

message ActivateReplicaCommand {
  int32 slot = 1;
  uint64 epoch = 2;
}

message MarkReplicaLeavingCommand {
  int32 slot = 1;
  uint64 epoch = 2;
}

message RemoveReplicaCommand {
  int32 slot = 1;
  uint64 epoch = 2;
}

message UpdateChainPeersCommand {
  ReplicaAssignment assignment = 1;
  uint64 epoch = 2;
}

message ResumeRecoveredReplicaCommand {
  ReplicaAssignment assignment = 1;
  uint64 epoch = 2;
}

message RecoverReplicaCommand {
  ReplicaAssignment assignment = 1;
  string source_node_id = 2;
  uint64 epoch = 3;
}

message DropRecoveredReplicaCommand {
  int32 slot = 1;
  uint64 epoch = 2;
}

message ClientGetRequest {
  int32 slot = 1;
  string key = 2;
  uint64 expected_chain_version = 3;
}

message ClientPutRequest {
  int32 slot = 1;
  string key = 2;
  string value = 3;
  uint64 expected_chain_version = 4;
  WriteConditions conditions = 5;
}

message ClientDeleteRequest {
  int32 slot = 1;
  string key = 2;
  uint64 expected_chain_version = 3;
  WriteConditions conditions = 4;
}

message CommitResult {
  int32 slot = 1;
  uint64 sequence = 2;
  bool applied = 3;
  ObjectMetadata metadata = 4;
}

message ReadResult {
  int32 slot = 1;
  uint64 chain_version = 2;
  bool found = 3;
  string value = 4;
  ObjectMetadata metadata = 5;
}

message WriteOperation {
  int32 slot = 1;
  uint64 sequence = 2;
  string kind = 3;
  string key = 4;
  string value = 5;
  ObjectMetadata metadata = 6;
}

message ForwardWriteRequest {
  WriteOperation operation = 1;
  string from_node_id = 2;
}

message CommitWriteRequest {
  int32 slot = 1;
  uint64 sequence = 2;
  string from_node_id = 3;
}

message FetchSnapshotRequest {
  int32 slot = 1;
}

message SnapshotEntry {
  string key = 1;
  string value = 2;
  ObjectMetadata metadata = 3;
}

message FetchCommittedSequenceRequest {
  int32 slot = 1;
}

message FetchCommittedSequenceResponse {
  uint64 sequence = 1;
}

message RoutingMismatchDetail {
  int32 slot = 1;
  uint64 expected_chain_version = 2;
  uint64 current_chain_version = 3;
  string current_role = 4;
  string current_state = 5;
  string reason = 6;
}

message AmbiguousWriteDetail {
  int32 slot = 1;
  string kind = 2;
  uint64 expected_chain_version = 3;
  string cause = 4;
}

message ConditionFailedDetail {
  int32 slot = 1;
  string kind = 2;
  uint64 expected_chain_version = 3;
  bool current_exists = 4;
  ObjectMetadata current_metadata = 5;
}

message BackpressureDetail {
  int32 slot = 1;
  int32 current = 2;
  int32 limit = 3;
  string resource = 4;
  string cause = 5;
}

message DomainErrorDetail {
  string kind = 1;
  int32 slot = 2;
  uint64 sequence = 3;
  string reason = 4;
}

message NotLeaderDetail {
  string leader_endpoint = 1;
}

service CoordinatorService {
  rpc Bootstrap(BootstrapRequest) returns (ServerState);
  rpc RegisterNode(RegisterNodeRequest) returns (ServerState);
  rpc AddNode(MembershipMutationRequest) returns (ServerState);
  rpc BeginDrainNode(MembershipMutationRequest) returns (ServerState);
  rpc MarkNodeDead(MembershipMutationRequest) returns (ServerState);
  rpc RoutingSnapshot(RoutingSnapshotRequest) returns (RoutingSnapshotResponse);
  rpc ReportReplicaReady(ReplicaReadyReport) returns (ServerState);
  rpc ReportReplicaRemoved(ReplicaRemovedReport) returns (ServerState);
  rpc ReportNodeHeartbeat(NodeStatus) returns (Empty);
  rpc ReportNodeRecovered(NodeRecoveryReport) returns (Empty);
  rpc EvaluateLiveness(Empty) returns (ServerState);
}

service StorageService {
  rpc Get(ClientGetRequest) returns (ReadResult);
  rpc Put(ClientPutRequest) returns (CommitResult);
  rpc Delete(ClientDeleteRequest) returns (CommitResult);
  rpc AddReplicaAsTail(AddReplicaAsTailCommand) returns (Empty);
  rpc ActivateReplica(ActivateReplicaCommand) returns (Empty);
  rpc MarkReplicaLeaving(MarkReplicaLeavingCommand) returns (Empty);
  rpc RemoveReplica(RemoveReplicaCommand) returns (Empty);
  rpc UpdateChainPeers(UpdateChainPeersCommand) returns (Empty);
  rpc ResumeRecoveredReplica(ResumeRecoveredReplicaCommand) returns (Empty);
  rpc RecoverReplica(RecoverReplicaCommand) returns (Empty);
  rpc DropRecoveredReplica(DropRecoveredReplicaCommand) returns (Empty);
  rpc ForwardWrite(ForwardWriteRequest) returns (Empty);
  rpc CommitWrite(CommitWriteRequest) returns (Empty);
  rpc FetchSnapshot(FetchSnapshotRequest) returns (stream SnapshotEntry);
  rpc FetchCommittedSequence(FetchCommittedSequenceRequest) returns (FetchCommittedSequenceResponse);
}
